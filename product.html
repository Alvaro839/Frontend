<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto - TWINS TECH</title>
    <link rel="stylesheet" href="styles.css?v=20260228">
</head>
<body>

    <!-- Header dinámico -->
    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.body.insertAdjacentHTML('afterbegin', data);
                
                setTimeout(() => {
                    if (typeof updateCart === 'function') {
                        updateCart();
                        console.log('✅ Contador carrito actualizado después de cargar header (product.html)');
                    }
                }, 300);
            })
            .catch(err => console.error('Error cargando header:', err));
    </script>

    <!-- Contenido del producto (asumiendo tu estructura) -->
    <main class="product-detail">
        <div class="product-detail-container">
            <div class="product-image-section">
                <img id="productImage" src="" alt="Producto">
            </div>
            <div class="product-info-section">
                <h1 id="productTitle">Cargando...</h1>
                <div class="product-price-box">
                    <p id="productPrice">Cargando...</p>
                </div>
                <button onclick="addToCartFromUrl()">Añadir al Carrito</button>
                <a id="whatsappProductLink" href="#">Consultar por WhatsApp</a>
            </div>
            <div class="product-specs-section">
                <h2>Descripción</h2>
                <div id="productSpecs">Cargando...</div>
            </div>
            <div class="recommended-section">
                <h2>Productos Recomendados</h2>
                <div id="recommendedProducts"></div>
            </div>
        </div>
    </main>

    <!-- Script principal -->
    <script src="script.js?v=20260228"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (id) showProductDetails(id);
        });
    </script>

</body>
</html>
