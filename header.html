<!-- Logo -->
<a href="index.html" class="logo-link">
    <img
        id="logo-img"
        src=""
        alt="Twins Tech Logo"
        style="height: 60px; object-fit: contain;"
    >
</a>

<script>
// Hacemos la función global para que index.html pueda llamarla
window.cargarLogo = function() {
    const BACKEND_URL = 'https://backend-ti9b.onrender.com';
    
    fetch(`${BACKEND_URL}/api/logo`)
        .then(res => {
            if (!res.ok) throw new Error('Error del servidor');
            return res.json();
        })
        .then(data => {
            const logo = document.getElementById('logo-img');
            if (logo && data.logo) {
                const fullUrl = data.logo.startsWith('http') 
                    ? data.logo 
                    : `${BACKEND_URL}${data.logo}`;
                
                logo.src = fullUrl;
                console.log('✅ Logo cargado correctamente:', fullUrl);
            }
        })
        .catch(err => {
            console.error('❌ Error cargando logo:', err);
        });
};

// Ejecutar automáticamente cuando se cargue el header
document.addEventListener('DOMContentLoaded', window.cargarLogo);
window.cargarLogo();   // Intento inmediato también
</script>

<!-- Menú de categorías -->
<nav class="categories">
    <ul id="categoryMenu">
        <li data-category="all">Todas las categorias</li>
        <li data-category="discos">Discos</li>
        <li data-category="mouses">Mouses</li>
        <li data-category="teclados-mouses">Teclados-Mouses</li>
        <li data-category="teclados">Teclados</li>
        <li data-category="adaptadores">Adaptadores</li>
        <li data-category="baterias">Baterías</li>
        <li data-category="cargadores">Cargadores</li>
        <li data-category="impresoras">Impresoras</li>
    </ul>

    <div id="submenu" class="submenu"></div>
</nav>

<!-- Scripts del header -->
<script>
    (function initHeader() {
        setTimeout(() => {
            // 1. Menú de categorías
            const menuItems = document.querySelectorAll('#categoryMenu li[data-category]');
            const submenu = document.getElementById('submenu');

            if (menuItems.length > 0 && submenu) {
                menuItems.forEach(item => {
                    const category = item.dataset.category;

                    item.addEventListener('click', (e) => {
                        e.stopPropagation();
                        window.location.href = `category.html?cat=${category}`;
                    });

                    item.addEventListener('mouseenter', () => {
                        if (typeof showSubmenu === 'function') showSubmenu(category);
                    });

                    item.addEventListener('mouseleave', () => {
                        if (typeof startHideTimer === 'function') startHideTimer();
                    });
                });

                submenu.addEventListener('mouseenter', () => {
                    if (typeof cancelHideTimer === 'function') cancelHideTimer();
                });
                submenu.addEventListener('mouseleave', () => {
                    if (typeof startHideTimer === 'function') startHideTimer();
                });
            }

            console.log('✅ Menú de categorías inicializado');

            // 2. Carrito
            function tryUpdateCart() {
                if (typeof updateCart === 'function') {
                    updateCart();
                    console.log('✅ Contador de carrito actualizado');
                    return true;
                }

                let attempts = 0;
                const maxAttempts = 80;
                const interval = setInterval(() => {
                    attempts++;
                    if (typeof updateCart === 'function') {
                        updateCart();
                        console.log(`✅ Contador actualizado tras ${attempts} intentos`);
                        clearInterval(interval);
                        return true;
                    }
                    if (attempts >= maxAttempts) {
                        clearInterval(interval);
                        console.warn('⚠️ No se pudo encontrar updateCart()');
                    }
                }, 50);

                return false;
            }

            tryUpdateCart();

            setTimeout(() => {
                if (typeof updateCart === 'function') {
                    updateCart();
                    console.log('✅ Contador actualizado (intento tardío)');
                }
            }, 800);

            // 3. Búsqueda
            const searchForm = document.getElementById('searchForm');
            const searchInput = document.getElementById('searchInput');

            if (searchForm && searchInput) {
                searchForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    performSearch();
                });

                searchInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === 'NumpadEnter') {
                        e.preventDefault();
                        performSearch();
                    }
                });
            }

        }, 10);
    })();
</script>
