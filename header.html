<!-- Script FINAL - FIX ULTRA ROBUSTO DEL CARRITO -->
<script>
    (function initHeaderMenu() {
        setTimeout(() => {
            // Inicialización del menú
            const menuItems = document.querySelectorAll('#categoryMenu li[data-category]');
            const submenu = document.getElementById('submenu');

            if (menuItems.length > 0 && submenu) {
                menuItems.forEach(item => {
                    const category = item.dataset.category;

                    item.addEventListener('click', (e) => {
                        e.stopPropagation();
                        window.location.href = `category.html?cat=${category}`;
                    });

                    item.addEventListener('mouseenter', () => {
                        if (typeof showSubmenu === 'function') showSubmenu(category);
                    });

                    item.addEventListener('mouseleave', () => {
                        if (typeof startHideTimer === 'function') startHideTimer();
                    });
                });

                submenu.addEventListener('mouseenter', () => {
                    if (typeof cancelHideTimer === 'function') cancelHideTimer();
                });
                submenu.addEventListener('mouseleave', () => {
                    if (typeof startHideTimer === 'function') startHideTimer();
                });
            }

            console.log('✅ Menú del header inicializado correctamente');

            // ================================================
            // FIX ULTRA ROBUSTO DEL CONTADOR (hasta 4 segundos de espera)
            // ================================================
            function tryUpdateCart() {
                if (typeof updateCart === 'function') {
                    updateCart();
                    console.log('✅ Contador actualizado desde header (inmediato)');
                    return;
                }

                let attempts = 0;
                const interval = setInterval(() => {
                    attempts++;
                    if (typeof updateCart === 'function') {
                        updateCart();
                        console.log('✅ Contador actualizado después de reintento #' + attempts);
                        clearInterval(interval);
                    } else if (attempts > 80) {   // 80 × 50ms = 4 segundos
                        clearInterval(interval);
                        console.warn('⚠️ updateCart() nunca se cargó en el header');
                    }
                }, 50);
            }

            tryUpdateCart();

        }, 120); // 120ms = tiempo óptimo
    })();
</script>
