<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - TWINS TECH</title>
    <link rel="stylesheet" href="styles.css?v=20260228">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="page-wrapper">

    <!-- HEADER -->
    <div id="header-container"></div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="cart-page">
        <div class="cart-container">
            <h1>Tu Carrito de Compras</h1>

            <div class="cart-layout">
                
                <!-- Lista de productos o mensaje vacío -->
                <div class="cart-items-section">
                    
                    <!-- Contenedor donde se renderizan los productos -->
                    <div id="cartItems" class="cart-items-list"></div>

                    <!-- Mensaje carrito vacío (SIN display:none - lo controla el JS) -->
                    <div id="emptyCart" class="empty-cart-message">
                        <i class="fas fa-shopping-cart"></i>
                        <h2>Tu carrito está vacío</h2>
                        <p>¡Parece que no has agregado ningún producto aún!</p>
                        <a href="index.html" class="btn-continue-shopping">Continuar comprando</a>
                    </div>

                </div>

                <!-- Resumen del pedido (sticky en desktop) -->
                <aside class="cart-summary-section">
                    <div class="cart-summary">
                        <h3>Resumen del pedido</h3>
                        <div class="summary-row">
                            <span>Subtotal (productos):</span>
                            <span id="subtotal">0.00 USD</span>
                        </div>
                        <div class="summary-row">
                            <span>Envío:</span>
                            <span id="shipping">Por calcular</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total:</span>
                            <span id="cartTotal">0.00 USD</span>
                        </div>

                        <button class="checkout-btn" onclick="checkout()">
                            <i class="fab fa-whatsapp"></i> Finalizar Compra por WhatsApp hoy hoy hoy
                        </button>

                        <p class="secure-note">
                            <i class="fas fa-lock"></i> Compra segura • Pago contra entrega disponible
                        </p>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <div id="footer-container"></div>

</div>

<!-- JS PRINCIPAL -->
<script src="script.js?v=20260228" defer></script>

<!-- Cargar Header -->
<script>
fetch('header.html')
    .then(response => response.text())
    .then(html => {
        document.getElementById('header-container').innerHTML = html;

        setTimeout(() => {
            if (typeof initHeaderAfterLoad === 'function') initHeaderAfterLoad();
            if (typeof updateCart === 'function') {
                updateCart();
                console.log('✅ Contador carrito actualizado después de cargar header (cart.html)');
            }
            if (typeof renderCartItems === 'function') renderCartItems();   // ← importante para cart page
        }, 300);
    })
    .catch(err => console.error('Error cargando header:', err));
</script>

<!-- Cargar Footer -->
<script>
fetch('footer.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('footer-container').innerHTML = data;
    })
    .catch(error => console.error('Error al cargar el footer:', error));
</script>

</body>
</html>
