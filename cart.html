<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - TWINS TECH</title>
    <!-- Versión actualizada para romper caché -->
    <link rel="stylesheet" href="styles.css?v=20260228d">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="page-wrapper">

    <!-- HEADER - con protección anti-duplicado y limpieza automática -->
    <div id="header-container"></div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="cart-page">
        <div class="cart-container">
            <h1>Tu Carrito de Compras</h1>

            <div class="cart-layout">
                
                <!-- Lista de productos o mensaje vacío -->
                <div class="cart-items-section">
                    <div id="cartItems" class="cart-items-list"></div>

                    <div id="emptyCart" class="empty-cart-message">
                        <i class="fas fa-shopping-cart"></i>
                        <h2>Tu carrito está vacío</h2>
                        <p>¡Parece que no has agregado ningún producto aún!</p>
                        <a href="index.html" class="btn-continue-shopping">Continuar comprando</a>
                    </div>
                </div>

                <!-- Resumen del pedido -->
                <aside class="cart-summary-section">
                    <div class="cart-summary">
                        <h3>Resumen del pedido</h3>
                        <div class="summary-row">
                            <span>Subtotal (productos):</span>
                            <span id="subtotal">0.00 USD</span>
                        </div>
                        <div class="summary-row">
                            <span>Envío:</span>
                            <span id="shipping">Por calcular</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total:</span>
                            <span id="cartTotal">0.00 USD</span>
                        </div>

                        <button class="checkout-btn" onclick="checkout()">
                            <i class="fab fa-whatsapp"></i> Finalizar Compra por WhatsApp
                        </button>

                        <p class="secure-note">
                            <i class="fas fa-lock"></i> Compra segura • Pago contra entrega disponible
                        </p>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <div id="footer-container"></div>

</div>

<!-- JS PRINCIPAL -->
<script src="script.js?v=20260228d" defer></script>

<!-- Cargar Header - BLINDADO + LIMPIEZA AUTOMÁTICA -->
<script>
    (function loadCartHeaderSafely() {
        // Chequeo: ¿ya hay header completo en el DOM?
        const headerParts = document.querySelectorAll('.top-bar, .main-header, .categories');
        const countBefore = headerParts.length;

        if (countBefore >= 3) {  // top-bar + header + nav ≈ 3
            console.log(`🛡️ Header YA completo en cart.html (${countBefore} partes) → NO fetch`);
            // Actualizamos carrito y renderizamos items del carrito
            setTimeout(() => {
                if (typeof updateCart === 'function') updateCart();
                if (typeof renderCartItems === 'function') renderCartItems();
            }, 200);
            return;
        }

        console.log('🟢 Cargando header en cart.html (no existe completo)');

        fetch('header.html?v=20260228d')
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.text();
            })
            .then(html => {
                // Doble chequeo antes de insertar
                const currentCount = document.querySelectorAll('.top-bar, .main-header, .categories').length;
                if (currentCount >= 3) {
                    console.warn(`⚠️ Header apareció durante fetch en cart.html (${currentCount}) → skip`);
                    return;
                }

                console.log('Insertando header en #header-container...');
                document.getElementById('header-container').innerHTML = html;

                // Contamos después
                const countAfter = document.querySelectorAll('.top-bar, .main-header, .categories').length;
                console.log(`Elementos de header después de insertar: ${countAfter}`);

                // Limpieza automática si hay duplicados
                if (countAfter > 3) {
                    console.error('¡DUPLICADOS DETECTADOS en cart.html! Limpiando extras...');
                    const allParts = document.querySelectorAll('.top-bar, .main-header, .categories');
                    
                    // Dejamos solo la primera ocurrencia de cada tipo
                    const keepers = new Set();
                    for (let el of allParts) {
                        const classKey = el.className; // o usa una clave más específica si necesitas
                        if (keepers.has(classKey)) {
                            el.remove();
                            console.log('Eliminado duplicado:', classKey);
                        } else {
                            keepers.add(classKey);
                        }
                    }
                }

                // Actualizaciones finales
                setTimeout(() => {
                    if (typeof initHeaderAfterLoad === 'function') initHeaderAfterLoad();
                    if (typeof updateCart === 'function') {
                        updateCart();
                        console.log('✅ Contador carrito actualizado después de header en cart.html');
                    }
                    if (typeof renderCartItems === 'function') renderCartItems();
                }, 400);
            })
            .catch(err => console.error('Error cargando header en cart.html:', err));
    })();
</script>

<!-- Cargar Footer -->
<script>
    fetch('footer.html?v=20260228d')
        .then(response => response.text())
        .then(data => {
            document.getElementById('footer-container').innerHTML = data;
        })
        .catch(error => console.error('Error footer:', error));
</script>

</body>
</html>
