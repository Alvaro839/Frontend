<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - TWINS TECH</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- JS principal -->
<script src="script.js" defer></script>

<!-- Cargar header y luego el carrito -->
<script>
// Reemplazar el fetch actual con ESTE:
fetch('header.html')
    .then(response => response.text())
    .then(html => {
        document.body.insertAdjacentHTML('afterbegin', html);
        
        // Inicializar el menú después de cargar
        setTimeout(() => {
            if (typeof initHeaderAfterLoad === 'function') {
                initHeaderAfterLoad();
            }
            
            // Inicializar otras funciones específicas de la página
            if (typeof updateCart === 'function') updateCart();
            if (typeof renderCartItems === 'function') renderCartItems();
            if (typeof loadCategoryProducts === 'function') {
                const urlParams = new URLSearchParams(window.location.search);
                const currentCat = urlParams.get('cat') || 'all';
                loadCategoryProducts(currentCat);
            }
        }, 200);
    })
    .catch(err => console.error('Error cargando header:', err));
</script>

<!-- Contenido del carrito -->
<main class="cart-page">
    <h1>Carrito de Compras</h1>

    <div id="cartItems" class="cart-items-list"></div>

    <div class="cart-summary">
        <p>Total: <span id="cartTotal">0</span> USD</p>
        <button class="checkout-btn" onclick="checkout()">
            Finalizar Compra en WhatsApp
        </button>
    </div>
</main>

<!-- AL FINAL DE cart.html, antes de </body> -->
<div id="footer-container"></div>

<script>
    fetch('footer.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('footer-container').innerHTML = data;
        })
        .catch(error => console.error('Error al cargar el footer:', error));
</script>
