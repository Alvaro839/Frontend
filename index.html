<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWINS TECH - Tienda de Hardware Tecnológico</title>
    <!-- Agregamos ?v= para evitar caché del navegador -->
    <link rel="stylesheet" href="styles.css?v=20260227">
</head>
<body>

    <!-- Header dinámico -->
    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => document.body.insertAdjacentHTML('afterbegin', data))
            .catch(err => console.error('Error cargando header:', err));
    </script>

    <!-- Carrusel horizontal de anuncios -->
    <section class="horizontal-ads-carousel">
        <div class="carousel-container">
            <button class="carousel-arrow prev" onclick="moveHorizontalAds(-1)">❮</button>

            <div class="carousel-track" id="horizontalAdsTrack">
                <!-- Las imágenes se cargarán aquí con JavaScript -->
            </div>

            <button class="carousel-arrow next" onclick="moveHorizontalAds(1)">❯</button>
        </div>

        <div class="carousel-indicators" id="horizontalAdsIndicators"></div>
    </section>

    <!-- Sección de Productos -->
    <section class="products-container">
        <div id="productsSection"></div>
    </section>

    <!-- Anuncio horizontal fijo a la izquierda (si lo usas) -->
    <div class="side-ad">
        <!-- Contenido del anuncio lateral -->
        <button class="close-ad" onclick="closeSideAd()">×</button>
    </div>

    <!-- Scripts -->
    <!-- Agregamos ?v= para evitar caché del navegador -->
    <script src="script.js?v=20260227"></script>

</body>
</html>
