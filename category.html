<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categoría - TWINS TECH</title>
    <!-- Versión actualizada -->
    <link rel="stylesheet" href="styles.css?v=20260228c">
</head>
<body>

    <!-- DEPURACIÓN inicial (para ver si hay algo antes del fetch) -->
    <script>
        console.log('🚨 Contador inicial de elementos clave:', {
            topBars: document.querySelectorAll('.top-bar').length,
            mainHeaders: document.querySelectorAll('.main-header').length,
            categoriesNav: document.querySelectorAll('.categories').length
        });
    </script>

    <!-- Header dinámico - BLINDADO + LIMPIEZA AUTOMÁTICA -->
    <script>
        (function loadHeaderSafely() {
            // Selector completo: top-bar + header principal + nav categorías
            const headerParts = document.querySelectorAll('.top-bar, .main-header, .categories');
            const countBefore = headerParts.length;

            console.log(`Chequeo inicial: ${countBefore} elementos de header encontrados`);

            if (countBefore >= 3) {  // top-bar + header + nav ≈ 3
                console.warn(`🛡️ Header YA completo (${countBefore} partes) → NO fetch`);
                setTimeout(() => {
                    if (typeof updateCart === 'function') updateCart();
                }, 150);
                return;
            }

            console.log('🟢 Procediendo a fetch (no hay header completo)');

            fetch('header.html?v=20260228c')
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.text();
                })
                .then(data => {
                    // Chequeo FINAL antes de insertar
                    const currentCount = document.querySelectorAll('.top-bar, .main-header, .categories').length;
                    if (currentCount >= 3) {
                        console.warn(`⚠️ Header apareció durante fetch (${currentCount}) → abort`);
                        return;
                    }

                    console.log('Insertando header...');
                    document.body.insertAdjacentHTML('afterbegin', data);

                    // Contamos después
                    const countAfter = document.querySelectorAll('.top-bar, .main-header, .categories').length;
                    console.log(`Elementos después de insertar: ${countAfter}`);

                    // Limpieza automática si hay duplicados
                    if (countAfter > 3) {
                        console.error('¡DUPLICADOS DETECTADOS! Limpiando extras...');
                        const allParts = document.querySelectorAll('.top-bar, .main-header, .categories');
                        
                        // Dejamos solo la primera ocurrencia de cada tipo
                        const keepers = new Set();
                        for (let el of allParts) {
                            if (keepers.has(el.className)) {
                                el.remove();
                                console.log('Eliminado duplicado:', el.className);
                            } else {
                                keepers.add(el.className);
                            }
                        }
                    }

                    // Actualizaciones finales
                    setTimeout(() => {
                        if (typeof updateCart === 'function') {
                            updateCart();
                            console.log('✅ Carrito actualizado post-inserción');
                        }
                        if (typeof initHeaderAfterLoad === 'function') {
                            initHeaderAfterLoad();
                        }
                    }, 400);
                })
                .catch(err => console.error('Error fetch header:', err));
        })();
    </script>

    <main class="category-page">
        <div class="category-container">
            
            <!-- Sidebar solo para Desktop -->
            <aside class="filters-sidebar desktop-only">
                <h3>Categorías</h3>
                <ul class="category-filter-list" id="categoryFilterList"></ul>

                <h3>Filtro por Precio</h3>
                <div class="price-filter-box">
                    <h4>Rango de precio</h4>
                    <div class="price-inputs">
                        <input type="number" id="minPrice" placeholder="Mínimo" />
                        <input type="number" id="maxPrice" placeholder="Máximo" />
                    </div>
                    <button id="applyFilters">Aplicar filtros</button>
                </div>
            </aside>

            <!-- Versión Móvil -->
            <div class="mobile-filters">
                <div class="mobile-filter-header" id="mobileCategoryHeader">
                    <span class="header-text">Filtros y Categorías</span>
                    <span class="toggle-arrow">▼</span>
                </div>
                <div class="mobile-filter-content" id="mobileCategoryContent">
                    <h4>Categorías</h4>
                    <ul class="category-filter-list" id="categoryFilterListMobile"></ul>

                    <h4>Filtro por Precio</h4>
                    <div class="price-filter-box">
                        <div class="price-inputs">
                            <input type="number" id="mobileMinPrice" placeholder="Mínimo" />
                            <input type="number" id="mobileMaxPrice" placeholder="Máximo" />
                        </div>
                        <button id="mobileApplyFilters">Aplicar filtros</button>
                    </div>
                </div>
            </div>

            <!-- Productos -->
            <section class="products-section">
                <div class="category-header">
                    <h1 id="categoryTitle">Categoría</h1>
                    <p id="resultCount">Mostrando 0 productos</p>
                </div>

                <div class="products-grid" id="productsSection"></div>
            </section>
        </div>
    </main>

    <!-- Script principal -->
    <script src="script.js?v=20260228c"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOMContentLoaded disparado en category.html');
            
            const urlParams = new URLSearchParams(window.location.search);
            const cat = urlParams.get('cat') || 'all';

            loadCategoryFilters();
            loadCategoryProducts(cat);

            setTimeout(() => {
                const desktopList = document.getElementById('categoryFilterList');
                const mobileList = document.getElementById('categoryFilterListMobile');
                if (desktopList && mobileList) {
                    mobileList.innerHTML = desktopList.innerHTML;
                    
                    const activeLink = mobileList.querySelector(`a[href*="cat=${cat}"]`);
                    if (activeLink) activeLink.parentElement.classList.add('active');
                }
            }, 800);

            const mobileHeader = document.getElementById('mobileCategoryHeader');
            const mobileContent = document.getElementById('mobileCategoryContent');
            const arrow = mobileHeader?.querySelector('.toggle-arrow');

            if (mobileHeader && mobileContent && arrow) {
                mobileHeader.addEventListener('click', () => {
                    mobileContent.classList.toggle('show');
                    arrow.textContent = mobileContent.classList.contains('show') ? '▲' : '▼';
                });
            }

            const mobileApplyBtn = document.getElementById('mobileApplyFilters');
            if (mobileApplyBtn) {
                mobileApplyBtn.addEventListener('click', () => {
                    document.getElementById('minPrice').value = document.getElementById('mobileMinPrice')?.value || '';
                    document.getElementById('maxPrice').value = document.getElementById('mobileMaxPrice')?.value || '';
                    loadCategoryProducts(cat);
                });
            }

            if (urlParams.has('search')) {
                const searchTerm = urlParams.get('search');
                const titleEl = document.getElementById('categoryTitle');
                if (titleEl) titleEl.textContent = `Resultados para "${searchTerm}"`;
            }
        });
    </script>
</body>
</html>
