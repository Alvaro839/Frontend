<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categoría - TWINS TECH</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Carga el header común (incluye barra de categorías) -->
    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => document.body.insertAdjacentHTML('afterbegin', data))
            .catch(err => console.error('Error cargando header:', err));
    </script>

    <main class="category-page">
        <div class="category-container">
            <!-- Filtros laterales -->
            <aside class="filters-sidebar">
                <h3>Categorías</h3>
                <ul class="category-filter-list" id="categoryFilterList"></ul>

                
                <h3>Filtro por Precio</h3>
<div class="price-filter-box">

    <h4>Filtrar por precio</h4>

    <div class="price-inputs">
        <input type="number" id="minPrice" placeholder="Mínimo" />
        <input type="number" id="maxPrice" placeholder="Máximo" />
    </div>

    <button id="applyFilters">Aplicar filtros</button>

</div>


<!-- Botón opcional, pero ahora filtra automáticamente al soltar el slider -->
<button id="applyFilters" style="display:none;">Aplicar Filtros</button> <!-- oculto si quieres automático -->  
            </aside>

            <!-- Productos -->
            <section class="products-section">
                <div class="category-header">
                    <h1 id="categoryTitle">Categoría</h1>
                    <p id="resultCount">Mostrando 0 productos</p>
                </div>

                <div class="products-grid" id="productsSection">
                    <!-- Aquí se cargan los productos -->
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
   <script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const cat = urlParams.get('cat') || 'all';

        loadCategoryFilters();        // sidebar categorías
        loadCategoryProducts(cat);    // productos iniciales

        // Inicializar filtro de precio
        const priceRange = document.getElementById('priceRange');
        const priceCurrent = document.getElementById('priceCurrent');
        const applyBtn = document.getElementById('applyFilters');

        if (priceRange && priceCurrent) {
            // Formato bonito con comas (S/ 1,234)
            const updateDisplay = () => {
                const value = Number(priceRange.value);
                priceCurrent.textContent = `S/ ${value.toLocaleString('es-PE')}`;
            };

            // Actualiza visualmente en tiempo real
            priceRange.oninput = updateDisplay;
            updateDisplay(); // inicial
        }

        // Botón "Aplicar Filtros" → recarga productos con filtro
        if (applyBtn) {
            applyBtn.addEventListener('click', () => {
                loadCategoryProducts(cat);
            });
        }
    });
</script>
